<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایستگاه تمرکز و مدیریت زمان پیشرفته</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b14">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- External stylesheet for better caching -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="theme-toggle" onclick="toggleTheme()">🌗 تغییر پوسته</button>

    <div class="audio-bar">
        <span style="font-size: 12px; font-weight: bold; opacity: 0.8;">🎧 تمرکز صوتی:</span>
        <button id="btn-noise" onclick="toggleWhiteNoise()">🌧️ صدای باران ممتد</button>
        <div class="audio-player-ui">
            <input type="file" id="audio-upload" multiple accept="audio/*" style="display:none;" onchange="loadPlaylist(event)">
            <button onclick="document.getElementById('audio-upload').click()" style="border:none; padding:5px;">🎵 انتخاب موسیقی لوکال</button>
            <audio id="music-player" controls style="height:30px; width: 200px; outline:none;"></audio>
        </div>
    </div>

    <button class="fab" onclick="toggleScratchpad()">📝</button>
    <div class="scratchpad-modal" id="scratchpad">
        <h4>💭 جعبه افکار سرگردان <span style="cursor:pointer;" onclick="toggleScratchpad()">✖</span></h4>
        <textarea id="scratchpad-text" placeholder="تایپ کنید... (خودکار ذخیره می‌شود)"></textarea>
    </div>

    <div class="container" id="login-section">
        <h2>🔒 ایستگاه تمرکز مطالعاتی</h2>
        <input type="password" id="password-input" placeholder="رمز عبور (HELLO)..." style="text-align: center; letter-spacing: 2px;">
        <button onclick="checkPassword()">ورود به ایستگاه 🚀</button>
        <button onclick="showReportsDirectly()" style="background-color: transparent; color: var(--text-color); border: 2px dashed var(--border-color); font-size: 14px;">📊 مشاهده مستقیم گزارش</button>
        <p id="login-error" style="color: #ff4757; display: none; margin-top: 15px;">❌ رمز عبور اشتباه است!</p>
    </div>

    <div class="container" id="setup-section">
        <div class="page-nav">
            <button onclick="goBack()">◀ خروج</button>
            <span class="nav-title">تنظیمات و الگوها</span>
            <button onclick="generateTracker()">تایید و شروع ▶</button>
        </div>
        <div class="templates-box">
            <h4>⚡ بارگذاری سریع الگوها:</h4>
            <div class="template-btns">
                <button onclick="loadTemplate('mba')">🎓 بسته آمادگی MBA</button>
                <button onclick="loadTemplate('uni')">🌱 بسته دروس دانشگاهی</button>
                <button onclick="loadTemplate('light')">☕ بسته مرور سبک</button>
            </div>
        </div>
        <div id="rows-container"></div>
        <button onclick="addNewRowSetting()" style="background-color: transparent; color: var(--text-color); border: 2px dashed var(--border-color);">➕ افزودن ردیف دستی</button>
    </div>

    <div class="container" id="tracker-section">
        <div class="page-nav">
            <button onclick="goBack()">◀ ویرایش برنامه</button>
            <span class="nav-title">داشبورد اجرایی</span>
            <button id="focus-btn" onclick="toggleFocusMode()" style="background:var(--success-color); border-color:var(--success-color); color:white; z-index:1005;">🎯 حالت تمرکز عمیق</button>
        </div>
        <p id="tracker-date-display" style="font-size: 14px; opacity: 0.8; margin-bottom: 20px;"></p>
        <div id="tracker-content"></div>
        <button id="save-btn" onclick="saveAndFinish()" style="background-color: var(--danger-color); margin-top: 30px;">🏁 پایان کامل روز و ذخیره دائم</button>
    </div>

    <div class="container" id="reports-section">
        <div class="page-nav">
            <button onclick="goBack()">◀ صفحه قبل</button>
            <span class="nav-title">آمار و عملکرد</span>
            <button style="visibility:hidden">بعدی ▶</button>
        </div>
        <div class="chart-card">
            <h4 style="margin:0 0 10px 0; font-size:14px; opacity:0.9; text-align:right;">🟩 نقشه حرارتی تعهد (۳۶۵ روز گذشته)</h4>
            <div class="heatmap-wrapper" id="heatmap-container"></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><h4>کل مطالعه</h4><p id="stat-total-time">۰ دقیقه</p></div>
            <div class="stat-card"><h4>تست‌ها</h4><p id="stat-total-tests" style="color:var(--success-color);">۰ تست</p></div>
            <div class="stat-card"><h4>چک‌پوینت</h4><p id="stat-total-cps">۰</p></div>
            <div class="stat-card"><h4>روزهای فعال</h4><p id="stat-total-days">۰ روز</p></div>
        </div>
        <button id="toggle-breakdown-btn" onclick="toggleSubjectBreakdown()" style="background-color: transparent; color: var(--primary-color); border: 2px dashed var(--primary-color); margin-top: 20px;">📊 تفکیک موضوعات</button>
        <div id="subject-breakdown-container" style="display: none; animation: slideUp 0.4s ease; width: 100%; margin-bottom: 25px;"></div>
        <h3>📜 تاریخچه تفصیلی</h3>
        <div class="history-list" id="history-container"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="backToSetup()" style="background-color: var(--primary-color);">📅 روز جدید</button>
            <button onclick="exportToCSV()" style="background-color: #27ae60;">📥 خروجی اکسل</button>
        </div>
    </div>

    <!-- Load optimized modules first -->
    <script src="timer.js"></script>
    <script src="audio-manager.js"></script>
    <script src="db-manager.js"></script>

    <script>
        // ========== GLOBAL STATE ==========
        let rowCount = 0;
        let studyData = [];
        let loginTimeStr = "";
        let pageHistory = ['login'];
        let currentPage = 'login';
        let isFocusMode = false;

        // Initialize managers
        const timerManager = new TimerManager();
        const audioManager = new AudioManager();
        const dbManager = new DBManager();

        // ========== UTILITY FUNCTIONS ==========
        function sanitizeText(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        }

        // ========== SCRATCHPAD MANAGEMENT ==========
        const scratchpadText = document.getElementById('scratchpad-text');
        scratchpadText.value = dbManager.getScratchpad();
        scratchpadText.addEventListener('input', (e) => dbManager.saveScratchpad(e.target.value));
        function toggleScratchpad() {
            document.getElementById('scratchpad').classList.toggle('active');
        }

        // ========== AUDIO MANAGEMENT ==========
        function toggleWhiteNoise() {
            const btn = document.getElementById('btn-noise');
            const isActive = audioManager.toggleWhiteNoise();
            if (isActive) {
                btn.classList.add('active-btn');
                btn.innerText = '⏹️ قطع صدای باران';
            } else {
                btn.classList.remove('active-btn');
                btn.innerText = '🌧️ صدای باران ممتد';
            }
        }

        let playlist = [];
        const audioPlayer = document.getElementById('music-player');

        function loadPlaylist(e) {
            const files = e.target.files;
            if (files.length === 0) return;
            audioManager.loadPlaylist(files);
            playlist = audioManager.getPlaylist();
            playTrack();
        }

        function playTrack() {
            playlist = audioManager.getPlaylist();
            if (playlist.length === 0) return;
            let currentTrackIdx = audioManager.getCurrentTrackIndex();
            audioPlayer.src = playlist[currentTrackIdx];
            audioPlayer.play();
        }

        audioPlayer.addEventListener('ended', () => {
            let currentTrackIdx = audioManager.getCurrentTrackIndex();
            currentTrackIdx++;
            playlist = audioManager.getPlaylist();
            if (currentTrackIdx < playlist.length) {
                audioManager.setCurrentTrackIndex(currentTrackIdx);
                playTrack();
            } else {
                audioManager.setCurrentTrackIndex(0);
            }
        });

        // ========== THEME MANAGEMENT ==========
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute("data-theme") === "dark";
            if (isDark) {
                body.removeAttribute("data-theme");
                dbManager.setTheme("light");
            } else {
                body.setAttribute("data-theme", "dark");
                dbManager.setTheme("dark");
            }
            updateAllRowProgressVisuals();
        }

        window.addEventListener('load', function() {
            const theme = dbManager.getTheme();
            if (theme === "dark") {
                document.body.setAttribute("data-theme", "dark");
            }
        });

        // ========== PAGE NAVIGATION ==========
        function navigate(targetPage, isBack = false) {
            if (!isBack && targetPage !== currentPage) {
                pageHistory.push(targetPage);
            }
            ['login', 'setup', 'tracker', 'reports'].forEach(id => {
                document.getElementById(id + '-section').style.display = 'none';
            });
            document.getElementById(targetPage + '-section').style.display = 'block';
            currentPage = targetPage;
            if (targetPage === 'reports') {
                refreshReportsData();
            }
        }

        function goBack() {
            if (pageHistory.length > 1) {
                pageHistory.pop();
                const prevPage = pageHistory[pageHistory.length - 1];
                navigate(prevPage, true);
            }
        }

        function checkPassword() {
            if (document.getElementById('password-input').value === 'HELLO') {
                loginTimeStr = new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('login-error').style.display = 'none';
                navigate('setup');
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        document.getElementById('password-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') checkPassword();
        });

        function showReportsDirectly() {
            if (document.getElementById('password-input').value === 'HELLO') {
                navigate('reports');
            } else {
                alert("رمز عبور اشتباه است.");
            }
        }

        // ========== FOCUS MODE ==========
        function toggleFocusMode() {
            const btn = document.getElementById('focus-btn');
            const body = document.body;
            if (!isFocusMode) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(e => {});
                }
                body.classList.add('focus-mode');
                btn.innerText = '❌ خروج از تمرکز';
                btn.style.background = 'transparent';
                btn.style.color = 'var(--text-color)';
                isFocusMode = true;
                syncActiveFocusRowVisuals();
            } else {
                exitFocusModeClean();
            }
        }

        function exitFocusModeClean() {
            if (document.fullscreenElement && document.exitFullscreen) {
                document.exitFullscreen().catch(e => {});
            }
            document.body.classList.remove('focus-mode');
            const btn = document.getElementById('focus-btn');
            if (btn) {
                btn.innerText = '🎯 حالت تمرکز عمیق';
                btn.style.background = 'var(--success-color)';
                btn.style.color = 'white';
            }
            isFocusMode = false;
            document.querySelectorAll('.tracker-row').forEach(row => row.classList.remove('active-focus-row'));
            updateAllRowProgressVisuals();
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && isFocusMode) exitFocusModeClean();
        });

        function syncActiveFocusRowVisuals(overrideRowId = null) {
            let activeRowId = overrideRowId;
            if (!activeRowId) {
                for (const timerId in timerManager.getAllTimers()) {
                    if (timerManager.getTimer(timerId).state === 'running') {
                        activeRowId = timerId.split('-')[0].replace('r', '');
                        break;
                    }
                }
            }
            if (!activeRowId && studyData.length > 0) activeRowId = studyData[0].id;
            document.querySelectorAll('.tracker-row').forEach(row => {
                if (row.id === `tracker-row-${activeRowId}`) {
                    row.classList.add('active-focus-row');
                } else {
                    row.classList.remove('active-focus-row');
                }
            });
        }

        // ========== TEMPLATES & SETUP ==========
        function loadTemplate(type) {
            document.getElementById('rows-container').innerHTML = '';
            rowCount = 0;
            if (type === 'mba') {
                createSpecificRow('ریاضیات', 'تست و مرور فرمول‌ها', 4, 45, 10);
                createSpecificRow('آمار و ترکیبیات', 'حل تست‌های سخت', 3, 50, 12);
                createSpecificRow('منطق و خط‌مشی', 'مطالعه و تجزیه', 3, 40, 8);
            } else if (type === 'uni') {
                createSpecificRow('طرح آزمایش‌ها', 'مرور واریانس و آزمون توکی', 3, 60, 15);
                createSpecificRow('اصلاح نباتات', 'حل مسائل و تست', 2, 45, 10);
                createSpecificRow('ژنتیک', 'خلاصه نویسی فصل‌ها', 3, 50, 12);
            } else if (type === 'light') {
                createSpecificRow('مرور سریع', 'خلاصه‌نویسی‌های روز گذشته', 2, 30, 5);
                createSpecificRow('کارهای شخصی/توسعه‌ای', 'پروژه و کد', 2, 45, 10);
            }
        }

        function createSpecificRow(name, desc, cps, time, breakTime) {
            rowCount++;
            const container = document.getElementById('rows-container');
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row-setup';
            rowDiv.id = `row-setup-${rowCount}`;
            rowDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <button class="btn-delete" onclick="removeRow('row-setup-${rowCount}')">حذف</button>
                    <strong style="color: var(--primary-color);">📌 ردیف مطالعاتی</strong>
                </div>
                <div class="input-group">
                    <div><label style="font-size:12px;">عنوان درس:</label>
                    <select class="row-name-input">
                        <option value="ریاضیات" ${name === 'ریاضیات' ? 'selected' : ''}>ریاضیات</option>
                        <option value="علوم" ${name === 'علوم' ? 'selected' : ''}>علوم</option>
                        <option value="زبان" ${name === 'زبان' ? 'selected' : ''}>زبان</option>
                        <option value="دیگر" ${name === 'دیگر' ? 'selected' : ''}>دیگر</option>
                    </select></div>
                    <div><label style="font-size:12px;">توضیحات:</label><input type="text" class="row-desc-input" value="${desc}"></div>
                </div>
                <div class="input-group">
                    <div><label style="font-size:12px;">تعداد چک‌پوینت:</label><input type="number" class="row-cps-input" min="1" value="${cps}"></div>
                    <div><label style="font-size:12px;">زمان (دقیقه):</label><input type="number" class="row-time-input" min="1" value="${time}"></div>
                    <div><label style="font-size:12px;">استراحت (دقیقه):</label><input type="number" class="row-break-input" min="0" value="${breakTime}"></div>
                </div>`;
            container.appendChild(rowDiv);
        }

        function addNewRowSetting() {
            createSpecificRow('ریاضیات', '', 4, 45, 10);
        }

        function removeRow(rowId) {
            document.getElementById(rowId)?.remove();
        }

        function generateTracker() {
            studyData = [];
            document.querySelectorAll('.row-setup').forEach((row, index) => {
                const name = sanitizeText(row.querySelector('.row-name-input').value);
                const desc = sanitizeText(row.querySelector('.row-desc-input').value || 'بدون توضیحات');
                const cps = parseInt(row.querySelector('.row-cps-input').value);
                const time = parseInt(row.querySelector('.row-time-input').value);
                const breakTime = parseInt(row.querySelector('.row-break-input').value);
                if (cps > 0 && time > 0) {
                    studyData.push({ id: index + 1, name, desc, cps, time, breakTime });
                }
            });
            if (studyData.length === 0) return alert("لطفاً حداقل یک ردیف وارد کنید.");
            if (!loginTimeStr) loginTimeStr = new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
            buildTrackerUI();
            navigate('tracker');
            document.getElementById('tracker-date-display').innerText = `امروز: ${new Date().toLocaleDateString('fa-IR')} | ورود: ${loginTimeStr}`;
        }

        // ========== TRACKER UI ==========
        function formatTime(seconds) {
            return `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
        }

        function buildTrackerUI() {
            timerManager.clearAll();
            const container = document.getElementById('tracker-content');
            container.innerHTML = '';

            studyData.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'tracker-row';
                rowDiv.id = `tracker-row-${row.id}`;

                let cpsHTML = '';
                for (let j = 1; j <= row.cps; j++) {
                    const timerId = `r${row.id}-c${j}`;
                    timerManager.registerTimer(timerId, row.time);
                    cpsHTML += `<div class="checkpoint" id="cp-${timerId}" onclick="handleCheckpointClick('${timerId}', ${row.id})">
                        <div class="checkpoint-fill" id="fill-${timerId}"></div>
                        <div class="time-display" id="time-${timerId}">${formatTime(row.time * 60)}</div>
                        <div class="cp-icon" id="icon-${timerId}">▶️</div>
                    </div>`;
                }

                rowDiv.innerHTML = `
                    <div class="tracker-row-progress" id="progress-${row.id}"></div>
                    <div class="tracker-row-content">
                        <div class="row-header">
                            <div class="row-header-top">
                                <span id="row-status-${row.id}">وضعیت: در حال انجام</span>
                                <span>📚 ${row.name} (مطالعه: ${row.time}دقیقه | استراحت: ${row.breakTime}دقیقه)</span>
                            </div>
                            <div class="row-desc-text">${row.desc}</div>
                        </div>
                        <div class="checkpoints-container">${cpsHTML}</div>
                        <div class="test-zone-container" id="test-zone-${row.id}">
                            <span>🎯 تعداد تست‌های تمرین شده در این بازه را وارد کنید:</span>
                            <input type="number" id="test-input-${row.id}" min="0" value="0">
                        </div>
                    </div>`;
                container.appendChild(rowDiv);
            });

            // Setup timer update callback
            timerManager.onUpdate((timers) => {
                for (const timerId in timers) {
                    const timer = timers[timerId];
                    const timeDisplay = document.getElementById(`time-${timerId}`);
                    const fill = document.getElementById(`fill-${timerId}`);
                    if (timeDisplay) {
                        timeDisplay.innerText = formatTime(Math.ceil(timer.remaining));
                    }
                    if (fill) {
                        const progress = ((timer.duration - timer.remaining) / timer.duration) * 100;
                        fill.style.width = Math.max(0, progress) + '%';
                    }
                }
            });

            // Listen for timer finish events
            document.addEventListener('timerFinished', (e) => {
                const timerId = e.detail.timerId;
                const rowId = parseInt(timerId.split('-')[0].replace('r', ''));
                const cp = document.getElementById(`cp-${timerId}`);
                const icon = document.getElementById(`icon-${timerId}`);
                if (cp && icon) {
                    cp.className = 'checkpoint finished';
                    icon.innerText = '✔️';
                }
                audioManager.playSmartBeep('cp');
                checkRowCompletion(rowId, true);
            });

            updateAllRowProgressVisuals();
        }

        function handleCheckpointClick(timerId, rowId) {
            const timer = timerManager.getTimer(timerId);
            const cp = document.getElementById(`cp-${timerId}`);
            const icon = document.getElementById(`icon-${timerId}`);

            if (timer.state === 'finished') {
                if (confirm("آیا مایل به حذف تیک این چک‌پوینت هستید؟")) {
                    timerManager.resetTimer(timerId);
                    cp.className = 'checkpoint';
                    icon.innerText = '▶️';
                    checkRowCompletion(rowId);
                    updateRowProgressVisuals(rowId);
                    if (isFocusMode) syncActiveFocusRowVisuals(rowId);
                }
                return;
            }

            if (timer.state === 'idle' || timer.state === 'paused') {
                timerManager.startTimer(timerId);
                cp.className = 'checkpoint running';
                icon.innerText = '⏸️';
                if (isFocusMode) syncActiveFocusRowVisuals(rowId);
            } else if (timer.state === 'running') {
                timerManager.pauseTimer(timerId);
                cp.className = 'checkpoint paused';
                icon.innerText = '▶️';
            }
            updateRowProgressVisuals(rowId);
        }

        function checkRowCompletion(rowId, justFinished = false) {
            const rowConfig = studyData.find(r => r.id === rowId);
            let allFinished = true;
            for (let j = 1; j <= rowConfig.cps; j++) {
                if (timerManager.getTimer(`r${rowId}-c${j}`).state !== 'finished') {
                    allFinished = false;
                    break;
                }
            }

            const el = document.getElementById(`tracker-row-${rowId}`);
            const st = document.getElementById(`row-status-${rowId}`);
            const testZone = document.getElementById(`test-zone-${rowId}`);

            if (allFinished) {
                if (!el.classList.contains('completed')) {
                    triggerFirecracker(el);
                    if (justFinished) audioManager.playSmartBeep('row');
                }
                el.classList.add('completed');
                st.innerText = "🏆 تکمیل شد";
                st.style.color = "var(--success-color)";
                testZone.classList.add('visible');
            } else {
                el.classList.remove('completed');
                st.innerText = "وضعیت: در حال انجام";
                st.style.color = "inherit";
                testZone.classList.remove('visible');
            }
            updateRowProgressVisuals(rowId);
        }

        function updateRowProgressVisuals(rowId) {
            const rowConfig = studyData.find(r => r.id === rowId);
            if (!rowConfig) return;

            let totalSeconds = rowConfig.cps * rowConfig.time * 60;
            let elapsedSeconds = 0;

            for (let j = 1; j <= rowConfig.cps; j++) {
                const t = timerManager.getTimer(`r${rowId}-c${j}`);
                elapsedSeconds += (t.duration - t.remaining);
            }

            const rowPercent = Math.round((elapsedSeconds / totalSeconds) * 100);
            const progressEl = document.getElementById(`progress-${rowId}`);
            if (progressEl) {
                progressEl.style.width = rowPercent + '%';
            }
        }

        function updateAllRowProgressVisuals() {
            studyData.forEach(row => updateRowProgressVisuals(row.id));
        }

        function triggerFirecracker(rowElement) {
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                const colors = ['#00cec9', '#ff7675', '#eccc68', '#1e90ff', '#ff007f', '#2ecc71', '#6c5ce7', '#ffffff'];
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.position = 'absolute';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.width = Math.random() * 8 + 4 + 'px';
                p.style.height = p.style.width;
                p.style.borderRadius = '50%';
                p.style.pointerEvents = 'none';

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 250 + 100;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;

                rowElement.appendChild(p);
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(0)`, opacity: 0 }
                ], { duration: 2000 });
                setTimeout(() => p.remove(), 2000);
            }
        }

        // ========== SAVE & FINISH ==========
        async function saveAndFinish() {
            if (isFocusMode) exitFocusModeClean();
            timerManager.stopAll();

            let mins = 0, finished = 0, planned = 0, dayTotalTests = 0, details = [];
            studyData.forEach(row => {
                let rFin = 0;
                for (let j = 1; j <= row.cps; j++) {
                    if (timerManager.getTimer(`r${row.id}-c${j}`).state === 'finished') {
                        mins += row.time;
                        rFin++;
                        finished++;
                    }
                    planned++;
                }
                const testInput = document.getElementById(`test-input-${row.id}`);
                let rowTests = testInput ? (parseInt(testInput.value) || 0) : 0;
                dayTotalTests += rowTests;
                details.push({ name: row.name, desc: row.desc, completed: rFin, total: row.cps, tests: rowTests, cpTime: row.time });
            });

            let db = await dbManager.getStudyData();
            let todayDateStr = new Date().toLocaleDateString('fa-IR');
            let existingIndex = db.findIndex(item => item.date === todayDateStr);

            if (existingIndex !== -1) {
                let todayRecord = db[existingIndex];
                todayRecord.endTime = new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
                todayRecord.minutes += mins;
                todayRecord.cpsFinished += finished;
                todayRecord.cpsPlanned += planned;
                todayRecord.totalTests += dayTotalTests;
                details.forEach(newSubj => {
                    let existingSubj = todayRecord.breakdown.find(b => b.name === newSubj.name && b.desc === newSubj.desc);
                    if (existingSubj) {
                        existingSubj.completed += newSubj.completed;
                        existingSubj.total += newSubj.total;
                        existingSubj.tests += newSubj.tests;
                    } else {
                        todayRecord.breakdown.push(newSubj);
                    }
                });
                alert("✨ پارت جدید با موفقیت ادغام شد.");
            } else {
                db.push({
                    date: todayDateStr,
                    loginTime: loginTimeStr,
                    endTime: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }),
                    minutes: mins,
                    cpsFinished: finished,
                    cpsPlanned: planned,
                    totalTests: dayTotalTests,
                    breakdown: details
                });
                alert("✨ اطلاعات با موفقیت ذخیره شد.");
            }

            await dbManager.forceWrite(db);
            navigate('reports');
        }

        // ========== REPORTS ==========
        async function refreshReportsData() {
            let db = await dbManager.getStudyData();
            const heatmapCont = document.getElementById('heatmap-container');
            heatmapCont.innerHTML = '';

            let today = new Date();
            for (let w = 0; w < 52; w++) {
                const col = document.createElement('div');
                col.className = 'heatmap-col';
                for (let d = 0; d < 7; d++) {
                    let pastDate = new Date(today);
                    pastDate.setDate(today.getDate() - (w * 7 + d));
                    let dateStr = pastDate.toLocaleDateString('fa-IR');
                    let record = db.find(x => x.date === dateStr);
                    let mins = record ? record.minutes : 0;
                    let level = 0;
                    if (mins > 0 && mins <= 60) level = 1;
                    else if (mins > 60 && mins <= 150) level = 2;
                    else if (mins > 150 && mins <= 300) level = 3;
                    else if (mins > 300) level = 4;

                    const cell = document.createElement('div');
                    cell.className = 'heatmap-cell';
                    cell.setAttribute('data-level', level);
                    cell.title = `${dateStr} - مطالعه: ${mins} دقیقه`;
                    col.appendChild(cell);
                }
                heatmapCont.appendChild(col);
            }

            let tMins = 0, tCps = 0, tTests = 0;
            let subjectStats = {};
            db.forEach(item => {
                tMins += item.minutes;
                tCps += item.cpsFinished;
                tTests += (item.totalTests || 0);
                item.breakdown.forEach(b => {
                    if (!subjectStats[b.name]) {
                        subjectStats[b.name] = { time: 0, tests: 0 };
                    }
                    let rowTime = b.cpTime ? (b.completed * b.cpTime) : 0;
                    subjectStats[b.name].time += rowTime;
                    subjectStats[b.name].tests += (b.tests || 0);
                });
            });

            document.getElementById('stat-total-time').innerText = `${tMins} دقیقه`;
            document.getElementById('stat-total-cps').innerText = tCps;
            document.getElementById('stat-total-tests').innerText = `${tTests} تست`;
            document.getElementById('stat-total-days').innerText = `${db.length} روز`;

            const breakdownCont = document.getElementById('subject-breakdown-container');
            breakdownCont.innerHTML = '';
            if (Object.keys(subjectStats).length > 0) {
                let gridHTML = '<div class="subject-breakdown-grid">';
                for (let subj in subjectStats) {
                    gridHTML += `<div class="subject-card"><h5>📘 ${subj}</h5><p>⏱️ ${subjectStats[subj].time} دقیقه</p><p style="color:var(--success-color);">🎯 ${subjectStats[subj].tests} تست</p></div>`;
                }
                gridHTML += '</div>';
                breakdownCont.innerHTML = gridHTML;
            } else {
                breakdownCont.innerHTML = '<p style="font-size:12px; opacity:0.6; text-align:center;">داده‌ای برای تفکیک وجود ندارد.</p>';
            }

            const cont = document.getElementById('history-container');
            cont.innerHTML = '';
            if (db.length === 0) return;
            for (let i = db.length - 1; i >= 0; i--) {
                let item = db[i];
                let perc = item.cpsPlanned > 0 ? Math.round((item.cpsFinished / item.cpsPlanned) * 100) : 0;
                let bdHTML = item.breakdown.map(b => `<div style="font-size:12px; background:rgba(0,0,0,0.04); padding:6px 10px; border-radius:8px; margin-top:5px; display:flex; justify-content:space-between;"><span>${b.name}</span><span>${b.completed}/${b.total} [${b.tests||0}]</span></div>`).join('');
                cont.innerHTML += `<div class="history-item"><div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; margin-bottom:5px;"><span>📅 ${item.date}</span><button class="btn-delete" onclick="deleteRecord(${i})">حذف</button></span></div><div style="font-size:13px; opacity:0.9;"><span>⏱️ ${item.loginTime} - ${item.endTime} | 📊 ${item.minutes} دقیقه | ✔️ ${item.cpsFinished}/${item.cpsPlanned} (${perc}%)</span></div><div style="background:rgba(0,0,0,0.03); padding:8px; border-radius:8px; margin-top:8px; text-align:right;">${bdHTML}</div></div>`;
            }
        }

        async function deleteRecord(index) {
            if (confirm("⚠️ آیا از حذف مطمئن هستید؟")) {
                let db = await dbManager.getStudyData();
                db.splice(index, 1);
                await dbManager.forceWrite(db);
                refreshReportsData();
            }
        }

        function toggleSubjectBreakdown() {
            const cont = document.getElementById('subject-breakdown-container');
            const btn = document.getElementById('toggle-breakdown-btn');
            if (cont.style.display === 'none') {
                cont.style.display = 'block';
                btn.innerText = '📊 پنهان کردن تفکیک';
            } else {
                cont.style.display = 'none';
                btn.innerText = '📊 تفکیک موضوعات';
            }
        }

        async function exportToCSV() {
            let db = await dbManager.getStudyData();
            if (db.length === 0) return alert("داده‌ای نیست.");

            const csv = dbManager.exportToCSV(db);
            const now = new Date();
            const dateStr = now.toLocaleDateString('fa-IR').replace(/\//g, '-');
            const timeStr = now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }).replace(/:/g, '-');
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `گزارش_${dateStr}_${timeStr}.csv`;
            link.click();
        }

        function backToSetup() {
            pageHistory = ['login'];
            document.getElementById('rows-container').innerHTML = '';
            rowCount = 0;
            navigate('setup');
        }

        // ========== PWA SERVICE WORKER ==========
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').then(function(registration) {
                    console.log('ServiceWorker registration successful:', registration.scope);
                }).catch(function(err) {
                    console.log('ServiceWorker registration failed:', err);
                });
            });
        }

        // ========== CLEANUP ON UNLOAD ==========
        window.addEventListener('beforeunload', () => {
            timerManager.stopAll();
            audioManager.cleanup();
            dbManager.cleanup();
        });
    </script>
</body>
